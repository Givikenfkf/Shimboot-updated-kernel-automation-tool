name: Build Shimboot Image (Octopus + ChromeOS 6.6 Kernel)

on:
  workflow_dispatch:
    inputs:
      board_name:
        description: 'Your Octopus board name (e.g. bobba, dorp, blooglet, fleex)'
        required: true
        type: string
      desktop:
        description: 'Desktop environment'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - gnome
          - kde
          - lxde
          - mate

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/share/boost \
            /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          sudo apt-get autoremove -y
          echo "=== After cleanup ==="
          df -h

      - name: Install all dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential bc bison flex \
            libssl-dev libelf-dev libncurses-dev \
            python3 cpio lz4 zstd \
            vboot-kernel-utils vboot-utils \
            wget curl unzip zip binwalk pcregrep \
            cgpt debootstrap fdisk \
            e2fsprogs kmod pv cryptsetup

      - name: Ensure vboot devkeys are present
        run: |
          if [ ! -f "/usr/share/vboot/devkeys/recovery_kernel.keyblock" ]; then
            git clone --depth=1 https://chromium.googlesource.com/chromiumos/platform/vboot_reference
            cd vboot_reference && make -j$(nproc)
            sudo mkdir -p /usr/share/vboot/devkeys
            sudo cp tests/devkeys/* /usr/share/vboot/devkeys/
            cd ..
            rm -rf vboot_reference
          fi
          ls /usr/share/vboot/devkeys/

      - name: Clone ChromeOS kernel 6.6
        run: |
          git clone --depth=1 --branch chromeos-6.6 \
            https://chromium.googlesource.com/chromiumos/third_party/kernel kernel

      - name: Configure kernel for Octopus (Gemini Lake x86_64)
        working-directory: kernel
        run: |
          if [ -f "arch/x86/configs/chromiumos-x86_64_defconfig" ]; then
            make chromiumos-x86_64_defconfig
          else
            make x86_64_defconfig
          fi
          [ -f "chromeos/scripts/prepareconfig" ] && bash chromeos/scripts/prepareconfig chromiumos-x86_64 || true
          # Enable essential features
          ./scripts/config --enable CONFIG_OVERLAY_FS
          ./scripts/config --enable CONFIG_SQUASHFS
          ./scripts/config --enable CONFIG_SQUASHFS_XZ
          ./scripts/config --enable CONFIG_SWAP
          ./scripts/config --enable CONFIG_ZSWAP
          ./scripts/config --enable CONFIG_ZRAM
          ./scripts/config --enable CONFIG_CGROUPS
          ./scripts/config --enable CONFIG_EXT4_FS
          ./scripts/config --enable CONFIG_BTRFS_FS
          ./scripts/config --enable CONFIG_TMPFS_POSIX_ACL
          ./scripts/config --enable CONFIG_MMC_SDHCI_ACPI
          ./scripts/config --enable CONFIG_IWLWIFI
          ./scripts/config --enable CONFIG_DRM_I915
          ./scripts/config --enable CONFIG_SND_HDA_INTEL
          make olddefconfig

      - name: Build kernel and modules
        working-directory: kernel
        run: |
          make -j$(nproc) bzImage modules

      - name: Save kernel artifacts
        run: |
          cp kernel/arch/x86/boot/bzImage ./bzImage
          cp kernel/.config ./kernel.config
          sudo make -C kernel INSTALL_MOD_PATH=$(pwd)/kernel_modules modules_install
          rm -rf kernel

      - name: Clone shimboot
        run: git clone --depth=1 https://github.com/ading2210/shimboot shimboot

      - name: Build shimboot image (using its default kernel first)
        working-directory: shimboot
        run: |
          sudo ./build_complete.sh "${{ github.event.inputs.board_name }}" \
            desktop="${{ github.event.inputs.desktop }}" \
            2>&1 | grep -av "^[[:space:]]*[0-9]\+K" | tee /tmp/shimboot_build.log
          test -f "data/shimboot_${{ github.event.inputs.board_name }}.bin" || exit 1

      - name: Replace kernel partition with custom 6.6 kernel (proper signing)
        run: |
          IMAGE="shimboot/data/shimboot_${{ github.event.inputs.board_name }}.bin"
          # Get partition 2 offsets
          KERN_START=$(sudo cgpt show -i 2 -b "$IMAGE")
          KERN_SIZE=$(sudo cgpt show -i 2 -s "$IMAGE")
          echo "Partition 2: start=$KERN_START sectors, size=$KERN_SIZE sectors"

          # Extract cmdline from the existing shimboot kernel (preserve boot args)
          sudo dd if="$IMAGE" of=old_kern.img bs=512 skip="$KERN_START" count="$KERN_SIZE" 2>/dev/null
          CMDLINE=$(futility dump_kernel_config old_kern.img 2>/dev/null | head -n1)
          if [ -z "$CMDLINE" ]; then
            # fallback to a working shimboot cmdline
            CMDLINE="console=tty1 init=/sbin/init rootwait ro"
          fi
          echo "Using cmdline: $CMDLINE"
          echo "$CMDLINE" > kernel.cmdline
          rm -f old_kern.img

          # Create a 512-byte bootloader stub (same as shimboot)
          dd if=/dev/zero of=bootloader.bin bs=512 count=1 2>/dev/null

          # Sign the new kernel using the exact same command as shimboot's build_complete.sh
          futility vbutil_kernel \
            --pack kernel.vboot \
            --keyblock /usr/share/vboot/devkeys/recovery_kernel.keyblock \
            --signprivate /usr/share/vboot/devkeys/recovery_kernel_data_key.vbprivk \
            --config kernel.cmdline \
            --vmlinuz bzImage \
            --bootloader bootloader.bin \
            --version 1 \
            --arch x86_64

          # Verify the signed kernel
          futility vbutil_kernel --verify kernel.vboot || { echo "Signing failed"; exit 1; }

          # Check size
          NEW_SECTORS=$(( ($(stat -c%s kernel.vboot) + 511) / 512 ))
          if [ $NEW_SECTORS -gt $KERN_SIZE ]; then
            echo "ERROR: kernel too large ($NEW_SECTORS > $KERN_SIZE sectors)"
            exit 1
          fi

          # Write the new kernel
          sudo dd if=/dev/zero of="$IMAGE" bs=512 seek="$KERN_START" count="$KERN_SIZE" conv=notrunc 2>/dev/null
          sudo dd if=kernel.vboot of="$IMAGE" bs=512 seek="$KERN_START" conv=notrunc 2>/dev/null

          # Set boot flags: priority=1, tries=0, successful=1 (required for ChromeOS vboot)
          sudo cgpt add -i 2 -P 1 -T 0 -S 1 "$IMAGE"

          # Cleanup
          rm -f kernel.vboot bootloader.bin kernel.cmdline bzImage

      - name: Inject custom kernel modules into rootfs
        run: |
          IMAGE="shimboot/data/shimboot_${{ github.event.inputs.board_name }}.bin"
          KVER=$(ls kernel_modules/lib/modules/)
          echo "Injecting modules for $KVER"

          ROOTFS_START=$(sudo cgpt show -i 4 -b "$IMAGE")
          OFFSET=$(( ROOTFS_START * 512 ))
          MOUNT="/mnt/shimboot_rootfs"
          sudo mkdir -p "$MOUNT"
          sudo mount -o loop,offset=$OFFSET "$IMAGE" "$MOUNT"

          # Remove any old modules
          sudo rm -rf "$MOUNT/lib/modules"/*
          sudo mkdir -p "$MOUNT/lib/modules"
          sudo cp -r "kernel_modules/lib/modules/$KVER" "$MOUNT/lib/modules/"
          sudo depmod -b "$MOUNT" "$KVER"

          sudo umount "$MOUNT"

      - name: Verify final kernel signature (debug)
        run: |
          IMAGE="shimboot/data/shimboot_${{ github.event.inputs.board_name }}.bin"
          echo "=== Final kernel partition verification ==="
          KERN_START=$(sudo cgpt show -i 2 -b "$IMAGE")
          KERN_SIZE=$(sudo cgpt show -i 2 -s "$IMAGE")
          sudo dd if="$IMAGE" of=final_kern.bin bs=512 skip="$KERN_START" count="$KERN_SIZE" 2>/dev/null
          futility vbutil_kernel --verify final_kern.bin || echo "WARNING: final kernel signature invalid!"
          futility dump_kernel_config final_kern.bin
          rm -f final_kern.bin

      - name: Rename and zip final image
        run: |
          sudo mv shimboot/data/shimboot_${{ github.event.inputs.board_name }}.bin shimboot_image.bin
          zip -j shimboot-${{ github.event.inputs.board_name }}-6.6.zip shimboot_image.bin
          ls -lh shimboot-*.zip

      - name: Upload bootable shimboot image
        uses: actions/upload-artifact@v4
        with:
          name: shimboot-${{ github.event.inputs.board_name }}-chromeos-6.6
          path: shimboot-${{ github.event.inputs.board_name }}-6.6.zip
          retention-days: 30

      - name: Upload kernel config
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config
          path: kernel.config
          retention-days: 30
