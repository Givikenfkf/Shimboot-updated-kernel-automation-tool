name: Build Shimboot Image (Octopus + ChromeOS 6.6 Kernel)

on:
  workflow_dispatch:
    inputs:
      board_name:
        description: 'Your Octopus board name (e.g. bobba, dorp, blooglet, fleex)'
        required: true
        type: string
      desktop:
        description: 'Desktop environment'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - gnome
          - kde
          - lxde
          - mate

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/share/boost \
            /usr/share/swift \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          sudo apt-get autoremove -y
          echo "=== After cleanup ==="
          df -h

      - name: Install all dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential bc bison flex \
            libssl-dev libelf-dev libncurses-dev \
            python3 cpio lz4 zstd \
            vboot-kernel-utils vboot-utils \
            wget curl unzip zip binwalk pcregrep \
            cgpt debootstrap fdisk \
            e2fsprogs kmod pv cryptsetup

      - name: Ensure vboot devkeys are present
        # vboot-utils on Ubuntu sometimes doesn't ship devkeys,
        # so we build them from source as a fallback
        run: |
          if [ ! -f "/usr/share/vboot/devkeys/recovery_kernel.keyblock" ]; then
            echo "Devkeys not found in package, building from source..."
            git clone --depth=1 \
              https://chromium.googlesource.com/chromiumos/platform/vboot_reference \
              vboot_reference
            cd vboot_reference && make -j$(nproc)
            sudo mkdir -p /usr/share/vboot/devkeys
            sudo cp tests/devkeys/* /usr/share/vboot/devkeys/
            cd ..
            rm -rf vboot_reference
          else
            echo "Devkeys found:"
            ls /usr/share/vboot/devkeys/
          fi

      - name: Clone ChromeOS kernel 6.6
        run: |
          git clone --depth=1 \
            --branch chromeos-6.6 \
            https://chromium.googlesource.com/chromiumos/third_party/kernel \
            kernel
          df -h

      - name: Configure kernel for Octopus (Gemini Lake x86_64)
        working-directory: kernel
        run: |
          if [ -f "arch/x86/configs/chromiumos-x86_64_defconfig" ]; then
            make chromiumos-x86_64_defconfig
          else
            make x86_64_defconfig
          fi
          [ -f "chromeos/scripts/prepareconfig" ] && \
            bash chromeos/scripts/prepareconfig chromiumos-x86_64 || true

          ./scripts/config --enable CONFIG_OVERLAY_FS
          ./scripts/config --enable CONFIG_SQUASHFS
          ./scripts/config --enable CONFIG_SQUASHFS_XZ
          ./scripts/config --enable CONFIG_SQUASHFS_LZ4
          ./scripts/config --enable CONFIG_SQUASHFS_ZLIB
          ./scripts/config --enable CONFIG_SWAP
          ./scripts/config --enable CONFIG_ZSWAP
          ./scripts/config --enable CONFIG_ZRAM
          ./scripts/config --enable CONFIG_CGROUPS
          ./scripts/config --enable CONFIG_CGROUP_BPF
          ./scripts/config --enable CONFIG_MEMCG
          ./scripts/config --enable CONFIG_CGROUP_DEVICE
          ./scripts/config --enable CONFIG_CGROUP_CPUACCT
          ./scripts/config --enable CONFIG_CGROUP_PIDS
          ./scripts/config --enable CONFIG_CGROUP_FREEZER
          ./scripts/config --enable CONFIG_IO_URING
          ./scripts/config --enable CONFIG_NAMESPACES
          ./scripts/config --enable CONFIG_USER_NS
          ./scripts/config --enable CONFIG_PID_NS
          ./scripts/config --enable CONFIG_NET_NS
          ./scripts/config --enable CONFIG_UTS_NS
          ./scripts/config --enable CONFIG_IPC_NS
          ./scripts/config --enable CONFIG_BPF
          ./scripts/config --enable CONFIG_BPF_SYSCALL
          ./scripts/config --enable CONFIG_EXT4_FS
          ./scripts/config --enable CONFIG_BTRFS_FS
          ./scripts/config --enable CONFIG_TMPFS
          ./scripts/config --enable CONFIG_TMPFS_POSIX_ACL
          ./scripts/config --enable CONFIG_MMC
          ./scripts/config --enable CONFIG_MMC_SDHCI
          ./scripts/config --enable CONFIG_MMC_SDHCI_ACPI
          ./scripts/config --enable CONFIG_MMC_SDHCI_PCI
          ./scripts/config --enable CONFIG_IWLWIFI
          ./scripts/config --enable CONFIG_IWLMVM
          ./scripts/config --enable CONFIG_DRM
          ./scripts/config --enable CONFIG_DRM_I915
          ./scripts/config --enable CONFIG_SND_HDA_INTEL
          ./scripts/config --enable CONFIG_SND_HDA_CODEC_HDMI
          ./scripts/config --enable CONFIG_USB_SUPPORT
          ./scripts/config --enable CONFIG_USB_XHCI_HCD
          make olddefconfig

      - name: Build kernel and modules
        working-directory: kernel
        run: |
          make -j$(nproc) bzImage modules 2>&1 | tail -20

      - name: Save kernel artifacts and delete source
        run: |
          cp kernel/arch/x86/boot/bzImage ./bzImage
          cp kernel/.config ./kernel.config
          sudo make -C kernel INSTALL_MOD_PATH=$(pwd)/kernel_modules modules_install
          rm -rf kernel
          echo "Kernel version directory:"
          ls kernel_modules/lib/modules/
          echo "=== Disk after kernel source deletion ==="
          df -h

      - name: Clone shimboot
        run: git clone --depth=1 https://github.com/ading2210/shimboot shimboot

      - name: Build shimboot image
        working-directory: shimboot
        run: |
          sudo ./build_complete.sh "${{ github.event.inputs.board_name }}" \
            desktop="${{ github.event.inputs.desktop }}" \
            2>&1 | grep -av "^[[:space:]]*[0-9]\+K" | tee /tmp/shimboot_build.log || true
          echo "=== Last 20 lines of build log ==="
          tail -20 /tmp/shimboot_build.log
          echo "=== Contents of data/ ==="
          ls -lah data/ || echo "data/ does not exist"
          df -h
          test -f "data/shimboot_${{ github.event.inputs.board_name }}.bin" || \
            { echo "FATAL: shimboot image not produced"; exit 1; }

      - name: Sign 6.6 kernel with devkeys and swap partition 2
        # Developer mode relaxes vboot signature checks for recovery boots so
        # standard devkeys work fine - this is exactly what shimboot itself uses
        # internally to sign its own partition 2 kernel.
        run: |
          IMAGE="shimboot/data/shimboot_${{ github.event.inputs.board_name }}.bin"

          echo "=== Partition table ==="
          sudo cgpt show "$IMAGE"

          # Extract cmdline from the existing shimboot partition 2 kernel
          # so shimboot's init script still gets the args it expects
          KERN_START=$(sudo cgpt show -i 2 -b "$IMAGE")
          KERN_SIZE=$(sudo cgpt show -i 2 -s "$IMAGE")
          echo "Partition 2: start=$KERN_START sectors, size=$KERN_SIZE sectors"

          sudo dd if="$IMAGE" of=existing_kern.img \
            bs=512 skip="$KERN_START" count="$KERN_SIZE" 2>/dev/null

          CMDLINE=$(futility dump_kernel_config existing_kern.img 2>/dev/null || echo "")
          if [ -z "$CMDLINE" ]; then
            echo "Warning: could not extract cmdline, using safe default"
            CMDLINE="console=tty1 init=/sbin/init rootwait ro"
          fi
          echo "Cmdline: $CMDLINE"
          echo "$CMDLINE" > kernel.cmdline
          rm -f existing_kern.img

          echo "=== Devkeys available ==="
          ls /usr/share/vboot/devkeys/

          # Sign our 6.6 kernel with devkeys
          dd if=/dev/zero of=bootloader.bin bs=512 count=1
          futility vbutil_kernel \
            --pack kernel.vboot \
            --keyblock /usr/share/vboot/devkeys/recovery_kernel.keyblock \
            --signprivate /usr/share/vboot/devkeys/recovery_kernel_data_key.vbprivk \
            --config kernel.cmdline \
            --vmlinuz bzImage \
            --bootloader bootloader.bin \
            --version 1 \
            --arch x86_64

          futility vbutil_kernel --verify kernel.vboot
          rm -f bootloader.bin bzImage kernel.cmdline

          # Check it fits
          NEW_KERN_SECTORS=$(( ($(stat -c%s kernel.vboot) + 511) / 512 ))
          echo "New kernel: $NEW_KERN_SECTORS sectors, partition has: $KERN_SIZE sectors"
          if [ "$NEW_KERN_SECTORS" -gt "$KERN_SIZE" ]; then
            echo "ERROR: kernel too large for partition 2"
            exit 1
          fi

          # Wipe and rewrite partition 2
          sudo dd if=/dev/zero of="$IMAGE" bs=512 \
            seek="$KERN_START" count="$KERN_SIZE" conv=notrunc
          sudo dd if=kernel.vboot of="$IMAGE" bs=512 \
            seek="$KERN_START" conv=notrunc
          rm -f kernel.vboot

          echo "Partition 2 swap complete"
          df -h

      - name: Inject modules into shimboot Debian rootfs
        run: |
          IMAGE="shimboot/data/shimboot_${{ github.event.inputs.board_name }}.bin"
          KVER=$(ls kernel_modules/lib/modules/)
          MOUNTPOINT="/mnt/shimboot_rootfs"
          echo "Injecting modules for: $KVER"

          ROOTFS_START=$(sudo cgpt show -i 4 -b "$IMAGE")
          OFFSET=$(( ROOTFS_START * 512 ))

          sudo mkdir -p "$MOUNTPOINT"
          sudo mount -o loop,offset=$OFFSET "$IMAGE" "$MOUNTPOINT"

          sudo mkdir -p "$MOUNTPOINT/lib/modules"

          # Remove any old kernel modules
          for old in "$MOUNTPOINT"/lib/modules/*/; do
            echo "Removing old modules: $old"
            sudo rm -rf "$old"
          done

          sudo cp -r kernel_modules/lib/modules/$KVER "$MOUNTPOINT/lib/modules/"
          sudo depmod -b "$MOUNTPOINT" $KVER || \
            echo "Warning: depmod failed"

          echo "=== Installed modules ==="
          ls "$MOUNTPOINT/lib/modules/"

          sudo umount "$MOUNTPOINT"

      - name: Rename image
        run: |
          sudo mv shimboot/data/shimboot_${{ github.event.inputs.board_name }}.bin \
             shimboot/data/shimboot_image.bin
          ls -lah shimboot/data/

      - name: Delete large intermediate artifacts to free disk
        run: |
          sudo rm -rf \
            shimboot/data/reco_${{ github.event.inputs.board_name }}.bin \
            shimboot/data/shim_${{ github.event.inputs.board_name }}.bin \
            shimboot/data/rootfs_${{ github.event.inputs.board_name }} \
            kernel_modules
          echo "=== Disk after cleanup ==="
          df -h

      - name: Zip final image
        run: |
          sudo zip -j shimboot_${{ github.event.inputs.board_name }}_chromeos-6.6.zip \
            shimboot/data/shimboot_image.bin
          ls -lh shimboot_${{ github.event.inputs.board_name }}_chromeos-6.6.zip

      - name: Upload bootable shimboot image
        uses: actions/upload-artifact@v4
        with:
          name: shimboot-${{ github.event.inputs.board_name }}-chromeos-6.6
          path: shimboot_${{ github.event.inputs.board_name }}_chromeos-6.6.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload kernel config
        uses: actions/upload-artifact@v4
        with:
          name: kernel-config
          path: kernel.config
          retention-days: 30
          if-no-files-found: error
